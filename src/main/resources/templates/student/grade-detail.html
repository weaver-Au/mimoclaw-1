<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('成绩详情 - 在线考试系统')}"></head>
<body>
<nav th:replace="~{fragments/layout :: student-navbar}"></nav>

<div class="container" style="padding-top: 80px;">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h4 class="fw-bold mb-2">成绩详情</h4>
            <p class="text-muted mb-4">试卷：<span th:text="${paper.name}"></span> | 总分：<span class="fw-bold text-primary" th:text="${totalScore}"></span></p>

            <div class="card mb-3" th:each="a, iter : ${answers}">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h6 class="fw-bold">
                            第 <span th:text="${iter.index + 1}"></span> 题
                            <span class="badge ms-2" th:classappend="${a.isCorrect ? 'bg-success' : 'bg-danger'}" th:text="${a.isCorrect ? '✓ 正确' : '✗ 错误'}"></span>
                        </h6>
                        <span class="fw-bold" th:text="${a.score} + '/' + ${a.questionScore} + '分'"></span>
                    </div>
                    <p th:text="${a.questionContent}"></p>
                    <div class="row">
                        <div class="col-md-6">
                            <small class="text-muted">你的答案：</small>
                            <span th:class="${a.isCorrect ? 'text-success' : 'text-danger'}" th:text="${a.answer ?: '未作答'}" class="fw-semibold"></span>
                        </div>
                        <div class="col-md-6">
                            <small class="text-muted">正确答案：</small>
                            <span class="text-success fw-semibold" th:text="${a.correctAnswer}"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-center mt-4">
                <a th:href="@{/student/grades}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>返回成绩列表</a>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
