<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<style>
    .anti-cheat-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
    .anti-cheat-overlay.show { display: flex; }
    .anti-cheat-overlay .content { text-align: center; color: #fff; }
    .anti-cheat-overlay .content i { font-size: 4rem; color: #ffc107; }
    .warning-count { position: fixed; top: 70px; right: 20px; z-index: 1060; }
</style>
<head th:replace="~{fragments/layout :: header('答题 - 在线考试系统')}"></head>
<body>
<nav th:replace="~{fragments/layout :: student-navbar}"></nav>

<div class="container" style="padding-top: 80px;">
    <div class="row">
        <!-- Main exam area -->
        <div class="col-lg-9">
            <div class="card mb-3">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold mb-0" th:text="${paper.name}"></h5>
                    <div>
                        <span class="badge bg-danger fs-6" id="timer"></span>
                    </div>
                </div>
            </div>

            <form th:action="@{/student/exam/submit/{id}(id=${paper.id})}" method="post" id="examForm" onsubmit="return confirmSubmit()">
                <div class="card mb-3" th:each="pq, iter : ${paper.paperQuestions}">
                    <div class="card-body">
                        <input type="hidden" name="questionIds" th:value="${pq.question.id}">
                        <div class="d-flex justify-content-between mb-2">
                            <h6 class="fw-bold">
                                <span class="badge me-2" th:classappend="${pq.question.type == 'SINGLE' ? 'bg-primary' : (pq.question.type == 'MULTI' ? 'bg-info' : (pq.question.type == 'JUDGE' ? 'bg-warning text-dark' : 'bg-secondary'))}"
                                      th:text="${pq.question.type == 'SINGLE' ? '单选' : (pq.question.type == 'MULTI' ? '多选' : (pq.question.type == 'JUDGE' ? '判断' : '主观'))}"></span>
                                第 <span th:text="${iter.index + 1}"></span> 题
                                <span class="text-muted fw-normal ms-2">(<span th:text="${pq.score}"></span>分)</span>
                            </h6>
                            <button type="button" class="btn btn-sm btn-outline-warning bookmark-btn" onclick="toggleBookmark(this)" title="标记待查">
                                <i class="bi bi-bookmark"></i>
                            </button>
                        </div>
                        <p th:text="${pq.question.content}"></p>

                        <!-- Single choice -->
                        <div th:if="${pq.question.type == 'SINGLE' or pq.question.type == 'MULTI'}">
                            <div class="options-container" th:attr="data-opts=${pq.question.options}, data-qid=${pq.question.id}, data-type=${pq.question.type}"></div>
                        </div>
                        <div th:if="${pq.question.type == 'ESSAY'}">
                            <textarea class="form-control" rows="5" th:name="'answers_' + ${pq.question.id}" placeholder="请输入你的答案..."></textarea>
                        </div>

                        <!-- Judge -->
                        <div th:if="${pq.question.type == 'JUDGE'}">
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="radio" th:name="'answers_' + ${pq.question.id}" value="正确" th:id="'q' + ${pq.question.id} + '_true'">
                                <label class="form-check-label" th:for="'q' + ${pq.question.id} + '_true'">正确</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="radio" th:name="'answers_' + ${pq.question.id}" value="错误" th:id="'q' + ${pq.question.id} + '_false'">
                                <label class="form-check-label" th:for="'q' + ${pq.question.id} + '_false'">错误</label>
                            </div>
                        </div>
                    </div>
                </div>

                

                <div class="text-center mb-4">
                    <button type="submit" class="btn btn-danger btn-lg px-5"><i class="bi bi-send me-2"></i>提交试卷</button>
                </div>
            </form>
        </div>

        <!-- Right sidebar - question navigation -->
        <div class="col-lg-3">
            <div class="card" style="position: sticky; top: 80px;">
                <div class="card-header fw-bold"><i class="bi bi-grid me-1"></i>答题卡</div>
                <div class="card-body">
                    <div class="d-flex flex-wrap gap-2" id="questionNav">
                        <button type="button" class="btn btn-sm btn-outline-secondary qnav-btn"
                                th:each="pq, iter : ${paper.paperQuestions}"
                                th:text="${iter.index + 1}"
                                th:onclick="'scrollToQuestion(' + ${iter.index} + ')'"></button>
                    </div>
                    <hr>
                    <div class="small">
                        <span class="badge bg-secondary me-1">■</span> 未答
                        <span class="badge bg-primary me-1 ms-2">■</span> 已答
                        <span class="badge bg-warning me-1 ms-2">■</span> 待查
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
// Timer
var duration = [[${paper.duration}]] * 60;
var timerEl = document.getElementById('timer');
function updateTimer() {
    var h = Math.floor(duration / 3600);
    var m = Math.floor((duration % 3600) / 60);
    var s = duration % 60;
    timerEl.textContent = (h > 0 ? h + ':' : '') + (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    if (duration <= 0) {
        document.getElementById('examForm').submit();
    }
    duration--;
}
updateTimer();
setInterval(updateTimer, 1000);

function scrollToQuestion(idx) {
    var cards = document.querySelectorAll('.card.mb-3');
    if (cards[idx + 1]) cards[idx + 1].scrollIntoView({behavior: 'smooth', block: 'center'});
}

function toggleBookmark(btn) {
    btn.classList.toggle('btn-warning');
    btn.classList.toggle('btn-outline-warning');
}

function confirmSubmit() {
    return confirm('确定要提交试卷吗？提交后不可修改。');
}

// Collect answers before submit
document.getElementById('examForm').addEventListener('submit', function(e) {
    document.querySelectorAll('.dynamic-answer').forEach(function(el) { el.remove(); });
    var questionIds = [];
    document.querySelectorAll('input[name="questionIds"]').forEach(function(el) {
        questionIds.push(el.value);
    });
    var form = document.getElementById('examForm');
    questionIds.forEach(function(qid) {
        var radios = document.querySelectorAll('input[name="answers_' + qid + '"]');
        var textarea = document.querySelector('textarea[name="answers_' + qid + '"]');
        var checked = [];
        if (textarea) {
            checked.push(textarea.value);
        } else {
            radios.forEach(function(r) {
                if (r.checked) checked.push(r.value);
            });
        }
        var hidden = document.createElement('input');
        hidden.type = 'hidden';
        hidden.name = 'answers';
        hidden.value = checked.join(',');
        hidden.className = 'dynamic-answer';
        form.appendChild(hidden);
    });
    var old = document.getElementById('answersArray');
    if (old) old.remove();
});
</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.options-container').forEach(function(container) {
        var optsStr = container.getAttribute('data-opts');
        var qid = container.getAttribute('data-qid');
        var type = container.getAttribute('data-type');
        var opts = [];
        try { opts = JSON.parse(optsStr); } catch(e) {}
        var html = '';
        if (type === 'ESSAY') return;
        var inputType = type === 'MULTI' ? 'checkbox' : 'radio';
        opts.forEach(function(opt, i) {
            html += '<div class="form-check mb-2"><input class="form-check-input" type="' + inputType + '" name="answers_' + qid + '" value="' + opt + '" id="q' + qid + '_' + i + '"><label class="form-check-label" for="q' + qid + '_' + i + '">' + opt + '</label></div>';
        });
        container.innerHTML = html;
    });
});
</script>
<!-- Anti-cheat warning overlay -->
<div class="anti-cheat-overlay" id="antiCheatOverlay">
    <div class="content">
        <i class="bi bi-exclamation-triangle"></i>
        <h3 class="mt-3">检测到切屏行为！</h3>
        <p class="mt-2">考试期间禁止切换窗口，累计 <span id="warnCountDisplay">0</span>/3 次警告后将自动交卷。</p>
        <button class="btn btn-warning btn-lg mt-3" onclick="dismissWarning()">返回考试</button>
    </div>
</div>
<!-- Warning badge -->
<div class="warning-count" id="warningBadge" style="display:none;">
    <span class="badge bg-danger fs-6"><i class="bi bi-exclamation-triangle me-1"></i>警告：<span id="warnBadgeCount">0</span>/3</span>
</div>
<script>
var warnCount = 0; var maxWarnings = 3;
document.addEventListener("visibilitychange", function() { if (document.hidden) { warnCount++; showAntiCheat(); } });
window.addEventListener("blur", function() { if (warnCount < maxWarnings) { warnCount++; showAntiCheat(); } });
function showAntiCheat() {
    document.getElementById("warnCountDisplay").textContent = warnCount;
    document.getElementById("warnBadgeCount").textContent = warnCount;
    document.getElementById("warningBadge").style.display = "block";
    document.getElementById("antiCheatOverlay").classList.add("show");
    if (warnCount >= maxWarnings) { alert("警告次数已达上限，系统将自动交卷！"); document.getElementById("examForm").submit(); }
}
function dismissWarning() { document.getElementById("antiCheatOverlay").classList.remove("show"); }
document.addEventListener("copy", function(e) { e.preventDefault(); });
document.addEventListener("paste", function(e) { e.preventDefault(); });
document.addEventListener("cut", function(e) { e.preventDefault(); });
document.addEventListener("contextmenu", function(e) { e.preventDefault(); });
document.addEventListener("keydown", function(e) {
    if (e.ctrlKey && (e.key === "c" || e.key === "v" || e.key === "a" || e.key === "x")) { e.preventDefault(); }
    if (e.key === "F12") { e.preventDefault(); }
});
document.onselectstart = function() { return false; };
</script>
</body>
</html>
