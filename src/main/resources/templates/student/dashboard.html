<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('学生首页 - 在线考试系统')}"></head>
<body>
<nav th:replace="~{fragments/layout :: student-navbar}"></nav>

<div class="container" style="padding-top: 80px;">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="text-center mb-5">
                <h3 class="fw-bold">欢迎回来，<span th:text="${session.loginUser.realName}"></span></h3>
                <p class="text-muted">祝你考试顺利！</p>
            </div>

            <div class="row g-4 mb-5">
                <div class="col-md-6">
                    <div class="card stat-card text-center p-4">
                        <div class="display-4 text-primary mb-2"><i class="bi bi-pencil-square"></i></div>
                        <h2 class="fw-bold" th:text="${examCount}">0</h2>
                        <p class="text-muted mb-0">可参加考试</p>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card stat-card text-center p-4">
                        <div class="display-4 text-success mb-2"><i class="bi bi-bar-chart"></i></div>
                        <h2 class="fw-bold"><a th:href="@{/student/grades}" class="text-decoration-none">查看 →</a></h2>
                        <p class="text-muted mb-0">我的成绩</p>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <h5 class="card-title"><i class="bi bi-lightning me-2"></i>快捷入口</h5>
                    <div class="d-flex gap-3 mt-3">
                        <a th:href="@{/student/exam/list}" class="btn btn-primary btn-lg"><i class="bi bi-pencil-square me-2"></i>进入考试</a>
                        <a th:href="@{/student/grades}" class="btn btn-outline-success btn-lg"><i class="bi bi-bar-chart me-2"></i>我的成绩</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
