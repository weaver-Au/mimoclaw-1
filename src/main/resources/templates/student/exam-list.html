<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('考试列表 - 在线考试系统')}"></head>
<body>
<nav th:replace="~{fragments/layout :: student-navbar}"></nav>

<div class="container" style="padding-top: 80px;">
    <h4 class="fw-bold mb-4">可参加的考试</h4>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-1"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-circle me-1"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
        <div class="col-md-6" th:each="p : ${papers}">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title fw-bold" th:text="${p.name}"></h5>
                    <p class="text-muted mb-2"><i class="bi bi-book me-1"></i><span th:text="${p.courseName}"></span></p>
                    <div class="d-flex gap-3 mb-3">
                        <span><i class="bi bi-clock me-1"></i><span th:text="${p.duration} + '分钟'"></span></span>
                        <span><i class="bi bi-star me-1"></i>总分 <span th:text="${p.totalScore}"></span></span>
                    </div>
                    <div th:if="${p.startTime != null}" class="small text-muted mb-2">
                        <i class="bi bi-calendar me-1"></i>
                        <span th:text="${#temporals.format(p.startTime, 'yyyy-MM-dd HH:mm')}"></span> ~
                        <span th:text="${#temporals.format(p.endTime, 'yyyy-MM-dd HH:mm')}"></span>
                    </div>
                    <a th:href="@{/student/exam/start/{id}(id=${p.id})}" class="btn btn-primary w-100 mt-2">
                        <i class="bi bi-pencil-square me-1"></i>参加考试
                    </a>
                </div>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(papers)}" class="col-12">
            <div class="text-center text-muted py-5">
                <i class="bi bi-inbox display-4"></i>
                <p class="mt-2">暂无可参加的考试</p>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
