<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('错误 - 在线考试系统')}"></head>
<body class="bg-light">
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="col-md-6 text-center">
            <i class="bi bi-exclamation-triangle text-warning display-1"></i>
            <h3 class="mt-3 fw-bold">出错了</h3>
            <p class="text-muted" th:text="${errorMessage} ?: '服务器内部错误'">错误信息</p>
            <a th:href="@{/}" class="btn btn-primary mt-3"><i class="bi bi-house me-1"></i>返回首页</a>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
