<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('管理后台 - 在线考试系统')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<nav th:replace="~{fragments/layout :: admin-sidebar}"></nav>

<div class="main-content" style="padding-top: 80px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">管理后台</h4>
        <span class="text-muted">欢迎，<span th:text="${session.loginUser.realName}"></span></span>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card stat-card">
                <div class="card-body text-center p-4">
                    <div class="display-4 text-primary mb-2"><i class="bi bi-people"></i></div>
                    <h2 class="fw-bold" th:text="${userCount}">0</h2>
                    <p class="text-muted mb-0">用户总数</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card">
                <div class="card-body text-center p-4">
                    <div class="display-4 text-success mb-2"><i class="bi bi-person-workspace"></i></div>
                    <h2 class="fw-bold" th:text="${teacherCount}">0</h2>
                    <p class="text-muted mb-0">教师数量</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card">
                <div class="card-body text-center p-4">
                    <div class="display-4 text-warning mb-2"><i class="bi bi-book"></i></div>
                    <h2 class="fw-bold" th:text="${courseCount}">0</h2>
                    <p class="text-muted mb-0">课程数量</p>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <h5 class="card-title"><i class="bi bi-lightning me-2"></i>快捷操作</h5>
            <div class="d-flex gap-3 mt-3">
                <a th:href="@{/admin/users}" class="btn btn-outline-primary"><i class="bi bi-people me-1"></i>用户管理</a>
                <a th:href="@{/admin/courses}" class="btn btn-outline-success"><i class="bi bi-book me-1"></i>课程管理</a>
                <a th:href="@{/admin/grades}" class="btn btn-outline-warning"><i class="bi bi-bar-chart me-1"></i>成绩查看</a>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
