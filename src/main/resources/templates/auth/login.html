<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('登录 - 在线考试系统')}"></head>
<body class="bg-light">
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-mortarboard-fill text-primary" style="font-size: 3rem;"></i>
                        <h3 class="mt-2 fw-bold">在线考试系统</h3>
                        <p class="text-muted">请登录您的账号</p>
                    </div>

                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-circle me-1"></i><span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <i class="bi bi-check-circle me-1"></i><span th:text="${success}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <!-- Login method tabs -->
                    <ul class="nav nav-pills nav-justified mb-4" role="tablist">
                        <li class="nav-item">
                            <a class="nav-link active" id="pwd-tab" data-bs-toggle="pill" href="#pwdLogin" role="tab">
                                <i class="bi bi-key me-1"></i>密码登录
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="phone-tab" data-bs-toggle="pill" href="#phoneLogin" role="tab">
                                <i class="bi bi-phone me-1"></i>验证码登录
                            </a>
                        </li>
                    </ul>

                    <div class="tab-content">
                        <!-- Password Login -->
                        <div class="tab-pane fade show active" id="pwdLogin" role="tabpanel">
                            <form th:action="@{/doLogin}" method="post">
                                <input type="hidden" name="loginType" value="password">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">角色</label>
                                    <select name="role" class="form-select" required>
                                        <option value="STUDENT">学生</option>
                                        <option value="TEACHER">教师</option>
                                        <option value="ADMIN">管理员</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">用户名</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                                        <input type="text" name="username" class="form-control" placeholder="请输入用户名" required>
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label fw-semibold">密码</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                        <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                                    <i class="bi bi-box-arrow-in-right me-1"></i>登录
                                </button>
                            </form>
                        </div>

                        <!-- Phone Login -->
                        <div class="tab-pane fade" id="phoneLogin" role="tabpanel">
                            <form th:action="@{/doLogin}" method="post">
                                <input type="hidden" name="loginType" value="phone">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">角色</label>
                                    <select name="role" class="form-select" required>
                                        <option value="STUDENT">学生</option>
                                        <option value="TEACHER">教师</option>
                                        <option value="ADMIN">管理员</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">手机号</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-phone"></i></span>
                                        <input type="text" name="phone" class="form-control" placeholder="请输入手机号" required>
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label fw-semibold">验证码</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                                        <input type="text" name="verifyCode" class="form-control" placeholder="请输入验证码" required>
                                        <button class="btn btn-outline-primary" type="button" id="sendCodeBtn" onclick="sendCode()">
                                            获取验证码
                                        </button>
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                                    <i class="bi bi-box-arrow-in-right me-1"></i>登录
                                </button>
                            </form>
                        </div>
                    </div>

                    <div class="text-center mt-3">
                        <span class="text-muted">没有账号？</span>
                        <a th:href="@{/register}" class="text-decoration-none">学生注册</a>
                    </div>

                    <div class="mt-4 p-3 bg-light rounded">
                        <small class="text-muted fw-bold">测试账号：</small><br>
                        <small class="text-muted">管理员: admin / admin123</small><br>
                        <small class="text-muted">教师: teacher1 / 123456</small><br>
                        <small class="text-muted">学生: student1 / 123456</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
var countdown = 60;
function sendCode() {
    var phone = document.querySelector('#phoneLogin input[name="phone"]').value;
    if (!phone || phone.length < 11) {
        alert('请输入正确的手机号');
        return;
    }
    var btn = document.getElementById('sendCodeBtn');
    btn.disabled = true;
    btn.textContent = '发送中...';

    // Simulate sending code (in production, call backend API)
    setTimeout(function() {
        alert('验证码已发送（测试模式：验证码为 123456）');
        btn.textContent = countdown + 's后重发';
        var timer = setInterval(function() {
            countdown--;
            btn.textContent = countdown + 's后重发';
            if (countdown <= 0) {
                clearInterval(timer);
                btn.disabled = false;
                btn.textContent = '获取验证码';
                countdown = 60;
            }
        }, 1000);
    }, 500);
}
</script>
</body>
</html>
