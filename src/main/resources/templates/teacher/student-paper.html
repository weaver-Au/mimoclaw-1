<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('学生答卷 - 在线考试系统')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<nav th:replace="~{fragments/layout :: teacher-sidebar}"></nav>

<div class="main-content" style="padding-top: 80px;">
    <h4 class="fw-bold mb-2">学生答卷查看</h4>
    <p class="text-muted mb-4">试卷：<span th:text="${paper.name}"></span> | 总得分：<span class="fw-bold text-primary" th:text="${totalScore}"></span></p>

    <div class="card mb-3" th:each="a, iter : ${answers}">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <h6 class="fw-bold">
                    <span class="badge me-2" th:classappend="${a.questionType == 'SINGLE' ? 'bg-primary' : (a.questionType == 'MULTI' ? 'bg-info' : (a.questionType == 'JUDGE' ? 'bg-warning text-dark' : 'bg-secondary'))}"
                          th:text="${a.questionType == 'SINGLE' ? '单选' : (a.questionType == 'MULTI' ? '多选' : (a.questionType == 'JUDGE' ? '判断' : '主观'))}"></span>
                    第 <span th:text="${iter.index + 1}"></span> 题
                    <span th:if="${a.graded}" class="badge ms-2" th:classappend="${a.isCorrect ? 'bg-success' : 'bg-danger'}" th:text="${a.isCorrect ? '✓ 正确' : '✗ 错误'}"></span>
                    <span th:if="${!a.graded}" class="badge bg-warning text-dark ms-2">待批改</span>
                </h6>
                <span class="fw-bold" th:text="${a.score} + '/' + ${a.questionScore} + '分'"></span>
            </div>
            <p th:text="${a.questionContent}"></p>
            <div class="row">
                <div class="col-md-6">
                    <small class="text-muted">学生答案：</small>
                    <div th:if="${a.questionType == 'ESSAY'}" class="p-2 bg-light rounded" th:text="${a.answer ?: '未作答'}"></div>
                    <span th:if="${a.questionType != 'ESSAY'}" th:class="${a.isCorrect ? 'text-success' : 'text-danger'}" th:text="${a.answer ?: '未作答'}" class="fw-semibold"></span>
                </div>
                <div class="col-md-6" th:if="${a.questionType != 'ESSAY'}">
                    <small class="text-muted">正确答案：</small>
                    <span class="text-success fw-semibold" th:text="${a.correctAnswer}"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex gap-2 mt-3">
        <a th:href="@{/teacher/grading/{paperId}/student/{studentId}/grade(paperId=${paper.id},studentId=${studentId})}" class="btn btn-warning"><i class="bi bi-pencil me-1"></i>手动批改</a>
        <a th:href="@{/teacher/grading/{paperId}(paperId=${paper.id})}" class="btn btn-outline-secondary">返回成绩列表</a>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
