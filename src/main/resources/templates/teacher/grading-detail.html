<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('成绩统计 - 在线考试系统')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<nav th:replace="~{fragments/layout :: teacher-sidebar}"></nav>

<div class="main-content" style="padding-top: 80px;">
    <h4 class="fw-bold mb-2">成绩统计：<span th:text="${paper.name}"></span></h4>
    <p class="text-muted mb-4">课程：<span th:text="${paper.courseName}"></span></p>

    <div class="row g-4 mb-4">
        <div class="col-md-3"><div class="card stat-card"><div class="card-body text-center"><h5 class="text-primary" th:text="${stats.count}">0</h5><small class="text-muted">参考人数</small></div></div></div>
        <div class="col-md-3"><div class="card stat-card"><div class="card-body text-center"><h5 class="text-success" th:text="${stats.avgScore}">0</h5><small class="text-muted">平均分</small></div></div></div>
        <div class="col-md-3"><div class="card stat-card"><div class="card-body text-center"><h5 class="text-warning" th:text="${stats.maxScore}">0</h5><small class="text-muted">最高分</small></div></div></div>
        <div class="col-md-3"><div class="card stat-card"><div class="card-body text-center"><h5 class="text-danger" th:text="${stats.minScore}">0</h5><small class="text-muted">最低分</small></div></div></div>
    </div>

    <div class="card mb-3">
        <div class="card-body text-center">
            <span class="fw-semibold">及格率：</span>
            <span class="display-6 fw-bold text-success" th:text="${stats.passRate} + '%'">0%</span>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><i class="bi bi-table me-1"></i>学生成绩单</div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead><tr><th>学生ID</th><th>学生姓名</th><th>总分</th><th>操作</th></tr></thead>
                    <tbody>
                    <tr th:each="s : ${scores}">
                        <td th:text="${s.studentId}"></td>
                        <td th:text="${s.studentName}"></td>
                        <td><span class="badge bg-primary" th:text="${s.score}"></span></td>
                        <td><a th:href="@{/teacher/grading/{paperId}/student/{studentId}(paperId=${paper.id},studentId=${s.studentId})}" class="btn btn-sm btn-outline-info"><i class="bi bi-eye me-1"></i>查看答卷</a></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="mt-3">
        <a th:href="@{/teacher/grading}" class="btn btn-outline-secondary">返回列表</a>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<div th:replace="~{fragments/layout :: scripts}"></div>

<script th:inline="javascript">
document.addEventListener('DOMContentLoaded', function() {
    var scores = [];
    document.querySelectorAll('table tbody tr td:last-child span').forEach(function(el) {
        var val = parseInt(el.textContent);
        if (!isNaN(val)) scores.push(val);
    });

    if (scores.length === 0) return;

    // Score distribution bar chart
    var ranges = ['0-9', '10-19', '20-29', '30-39', '40-49', '50-59', '60-69', '70-79', '80-89', '90-100'];
    var counts = new Array(10).fill(0);
    scores.forEach(function(s) {
        var idx = Math.min(Math.floor(s / 10), 9);
        counts[idx]++;
    });

    new Chart(document.getElementById('scoreChart'), {
        type: 'bar',
        data: {
            labels: ranges,
            datasets: [{label: '人数', data: counts, backgroundColor: 'rgba(54, 162, 235, 0.7)', borderColor: 'rgba(54, 162, 235, 1)', borderWidth: 1}]
        },
        options: {responsive: true, scales: {y: {beginAtZero: true, ticks: {stepSize: 1}}}, plugins: {legend: {display: false}}}
    });

    // Pass rate pie chart
    var passCount = scores.filter(function(s) { return s >= 60; }).length;
    var failCount = scores.length - passCount;
    new Chart(document.getElementById('passChart'), {
        type: 'doughnut',
        data: {
            labels: ['及格', '不及格'],
            datasets: [{data: [passCount, failCount], backgroundColor: ['rgba(40, 167, 69, 0.8)', 'rgba(220, 53, 69, 0.8)']}]
        },
        options: {responsive: true, plugins: {legend: {position: 'bottom'}}}
    });
});
</script>
</body>
</html>
