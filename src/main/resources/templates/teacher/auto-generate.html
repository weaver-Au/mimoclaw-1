<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('自动组卷 - 在线考试系统')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<nav th:replace="~{fragments/layout :: teacher-sidebar}"></nav>

<div class="main-content" style="padding-top: 80px;">
    <h4 class="fw-bold mb-2">自动组卷：<span th:text="${paper.name}"></span></h4>
    <p class="text-muted mb-4">课程：<span th:text="${paper.courseName}"></span></p>

    <div class="card">
        <div class="card-body p-4">
            <form th:action="@{/teacher/papers/autoGenerate/{id}(id=${paper.id})}" method="post">
                <div class="row g-4">
                    <div class="col-12">
                        <h6 class="fw-bold text-primary"><i class="bi bi-sliders me-1"></i>题目数量配置</h6>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">单选题数量</label>
                        <input type="number" name="singleCount" class="form-control" value="5" min="0">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">多选题数量</label>
                        <input type="number" name="multiCount" class="form-control" value="3" min="0">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">判断题数量</label>
                        <input type="number" name="judgeCount" class="form-control" value="2" min="0">
                    </div>

                    <div class="col-12">
                        <h6 class="fw-bold text-primary"><i class="bi bi-star me-1"></i>分值配置</h6>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">每题单选分值</label>
                        <input type="number" name="singleScore" class="form-control" value="2" min="1">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">每题多选分值</label>
                        <input type="number" name="multiScore" class="form-control" value="3" min="1">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">每题判断分值</label>
                        <input type="number" name="judgeScore" class="form-control" value="2" min="1">
                    </div>

                    <div class="col-12">
                        <h6 class="fw-bold text-primary"><i class="bi bi-filter me-1"></i>难度筛选（可选）</h6>
                    </div>
                    <div class="col-md-4">
                        <select name="difficulty" class="form-select">
                            <option value="0">全部难度</option>
                            <option value="1">简单</option>
                            <option value="2">中等</option>
                            <option value="3">困难</option>
                        </select>
                    </div>
                </div>

                <div class="alert alert-info mt-4">
                    <i class="bi bi-info-circle me-1"></i>
                    系统将从题库中按题型随机抽取指定数量的题目，自动计算总分。
                </div>

                <div class="mt-3">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-magic me-1"></i>自动生成</button>
                    <a th:href="@{/teacher/papers/selectQuestions/{id}(id=${paper.id})}" class="btn btn-outline-secondary">手动选题</a>
                    <a th:href="@{/teacher/papers}" class="btn btn-outline-secondary">返回列表</a>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
