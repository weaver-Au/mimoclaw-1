<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="header(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">在线考试系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --sidebar-width: 250px; }
        body { background-color: #f5f7fa; min-height: 100vh; }
        .sidebar { width: var(--sidebar-width); min-height: 100vh; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); position: fixed; top: 0; left: 0; z-index: 100; padding-top: 60px; transition: all 0.3s; }
        .sidebar .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; border-radius: 8px; margin: 2px 10px; transition: all 0.2s; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(255,255,255,0.15); color: #fff; }
        .sidebar .nav-link i { margin-right: 10px; width: 20px; text-align: center; }
        .main-content { margin-left: var(--sidebar-width); padding: 20px 30px; }
        .navbar-brand { font-weight: 700; font-size: 1.3rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .card-header { background: none; border-bottom: 1px solid #eee; font-weight: 600; }
        .stat-card { transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-3px); }
        .table th { font-weight: 600; background: #f8f9fa; }
        .btn { border-radius: 8px; }
        .form-control, .form-select { border-radius: 8px; }
        .alert { border-radius: 10px; border: none; }
    </style>
</head>
<body>
<!-- Top Navbar -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top shadow-sm" style="z-index:1050;">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-mortarboard-fill me-2"></i>在线考试系统
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item" th:if="${session.loginUser != null}">
                    <span class="nav-link text-light">
                        <i class="bi bi-person-circle me-1"></i>
                        <span th:text="${session.loginUser.realName}"></span>
                        <span class="badge bg-warning text-dark ms-1" th:text="${session.loginUser.role}"></span>
                    </span>
                </li>
                <li class="nav-item" th:if="${session.loginUser != null}">
                    <a class="nav-link" th:href="@{/logout}"><i class="bi bi-box-arrow-right me-1"></i>退出</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Admin Sidebar -->
<nav th:fragment="admin-sidebar" class="sidebar" style="padding-top: 70px;">
    <div class="px-3 mb-3">
        <small class="text-white-50 text-uppercase fw-bold">管理后台</small>
    </div>
    <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i>仪表盘</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/admin/users}"><i class="bi bi-people"></i>用户管理</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/admin/courses}"><i class="bi bi-book"></i>课程管理</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/admin/grades}"><i class="bi bi-bar-chart"></i>成绩查看</a></li>
    </ul>
</nav>

<!-- Teacher Sidebar -->
<nav th:fragment="teacher-sidebar" class="sidebar" style="padding-top: 70px;">
    <div class="px-3 mb-3">
        <small class="text-white-50 text-uppercase fw-bold">教师工作台</small>
    </div>
    <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link" th:href="@{/teacher/dashboard}"><i class="bi bi-speedometer2"></i>工作台</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/teacher/questions}"><i class="bi bi-journal-text"></i>题库管理</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/teacher/papers}"><i class="bi bi-file-earmark-text"></i>试卷管理</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/teacher/grading}"><i class="bi bi-check2-square"></i>阅卷管理</a></li>
    </ul>
</nav>

<!-- Student Navbar -->
<nav th:fragment="student-navbar" class="navbar navbar-expand-lg navbar-dark bg-success fixed-top shadow-sm" style="z-index:1050;">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/student/dashboard}">
            <i class="bi bi-mortarboard-fill me-2"></i>在线考试系统
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/student/dashboard}"><i class="bi bi-house me-1"></i>首页</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/student/exam/list}"><i class="bi bi-pencil-square me-1"></i>考试列表</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/student/grades}"><i class="bi bi-bar-chart me-1"></i>我的成绩</a></li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item">
                    <span class="nav-link text-light">
                        <i class="bi bi-person-circle me-1"></i>
                        <span th:text="${session.loginUser.realName}"></span>
                    </span>
                </li>
                <li class="nav-item"><a class="nav-link" th:href="@{/logout}"><i class="bi bi-box-arrow-right me-1"></i>退出</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Footer -->
<footer th:fragment="footer" class="text-center text-muted py-4 mt-4" style="border-top: 1px solid #eee;">
    <small>&copy; 2024 在线考试系统 | Powered by Spring Boot 3</small>
</footer>

<!-- Scripts -->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</div>
</body>
</html>
